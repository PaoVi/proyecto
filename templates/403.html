<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado - CarSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            padding: 20px;
        }
        .compact-card {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .compact-card-body {
            padding: 2rem;
        }
        .compact-icon {
            font-size: 3rem;
        }
        .compact-title {
            font-size: 1.75rem;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        .compact-alert {
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
        }
        .compact-text {
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }
        .btn-outline-secondary {
            border-radius: 8px;
            padding: 0.5rem 1.5rem;
        }
    </style>
</head>

<body>
    <div class="compact-card">
        <div class="card-body text-center compact-card-body">
            <!-- ICONO -->
            <i class="bi bi-shield-x text-danger compact-icon"></i>
            
            <!-- TÍTULO -->
            <h1 class="compact-title text-danger fw-bold">Acceso Denegado</h1>
            
            <!-- MENSAJE DESCRIPTIVO -->
            <p class="text-muted compact-text">
                No tienes los permisos necesarios para acceder a esta página.
            </p>

            <!-- INFROMACIÓN ESPECÍFICA DEL ERROR -->
            <div class="alert alert-warning compact-alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <strong>Función restringida:</strong>
                <span id="funcion-restringida">Acceder a esta sección</span>
            </div>

            <!-- CÓDIGO DE ERROR -->
            <p class="text-muted small mb-3">
                Error 403 - Forbidden
            </p>

            <!-- BOTONES DE ACCIÓN -->
            <div class="d-grid">
                <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-house me-1"></i>Ir al Inicio
                </a>
            </div>

            <!-- INFORMACIÓN ADICIONAL -->
            <div class="mt-3 pt-3 border-top">
                <small class="text-muted">
                    Contacta al administrador si necesitas acceso a esta funcionalidad.
                </small>
            </div>
        </div>
    </div>

    <script>
        // Simular la detección de la ruta (en un entorno real esto vendría del servidor)
        document.addEventListener('DOMContentLoaded', function() {
            const path = window.location.pathname;
            const funcionElement = document.getElementById('funcion-restringida');
            
            if (path.includes('editar')) {
                funcionElement.textContent = 'Modificar esta sección';
            } else if (path.includes('crear')) {
                funcionElement.textContent = 'Registrar esta sección';
            } else if (path.includes('desactivar')) {
                funcionElement.textContent = 'Activar/Desactivar esta sección';
            } else if (path.includes('rol')) {
                funcionElement.textContent = 'Gestionar esta sección';
            } else {
                funcionElement.textContent = 'Acceder a esta sección';
            }
        });
    </script>
</body>
</html>
